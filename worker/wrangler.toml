# Wrangler config for AFO Site Worker
# Deploy: wrangler deploy --config worker/wrangler.toml

name = "afo-site"
main = "worker/audit-intake.js"
compatibility_date = "2024-09-23"

# Route: afo-site owns the wildcard catch-all for agentfeedoptimization.com.
# More-specific routes on the same domain are owned by separate Workers:
#   /start, /results, /api/visibility-snapshot  → afo-visibility-snapshot
#   /signup                                      → afo-audit-signup
routes = [
  { pattern = "agentfeedoptimization.com/*", zone_name = "agentfeedoptimization.com" }
]

# Secrets — set via: wrangler secret put GITHUB_TOKEN
# Do NOT put real values here. Use wrangler secret or CF Dashboard.
# Required:
#   GITHUB_TOKEN        (fine-grained PAT, see docs/phase-2-setup.md)
#   GITHUB_REPO         = "nothinginfinity/afo-site"
#   GITHUB_INTAKE_MODE  = "issue" or "dispatch"
#   ALLOWED_ORIGIN      = "https://agentfeedoptimization.com"

[vars]
GITHUB_REPO = "nothinginfinity/afo-site"
GITHUB_INTAKE_MODE = "issue"
ALLOWED_ORIGIN = "https://agentfeedoptimization.com"

# Uncomment to enable KV rate limiting:
# [[kv_namespaces]]
# binding = "RATE_LIMIT_KV"
# id = "YOUR_KV_NAMESPACE_ID_HERE"
